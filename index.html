<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Calculate USD landed cost, GTM, and build a simple customer quote."
    >
    <title>GTM Calc and Quote Tool</title>
    <link rel="stylesheet" href="css/main.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">USD Quote Tool</p>
          <h1>GTM Calc and Quote Tool</h1>
        </div>
        <button id="viewQuote" type="button" class="button secondary">View Quote</button>
      </header>

      <section class="panel calculator-panel" aria-labelledby="calculator-heading">
        <div class="section-heading">
          <h2 id="calculator-heading">Item Calculator</h2>
          <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
        </div>

        <form id="itemForm" novalidate>
          <div class="form-grid">
            <label>
              Item
              <input id="itemName" name="itemName" type="text" autocomplete="off" required>
            </label>

            <label>
              Qty
              <input id="quantity" name="quantity" type="number" inputmode="numeric" step="1" min="1" required>
            </label>

            <label>
              Unit Cost USD
              <input id="unitCost" name="unitCost" type="number" inputmode="decimal" step="0.01" min="0" required>
            </label>

            <label>
              Price USD
              <input id="price" name="price" type="number" inputmode="decimal" step="0.01" min="0" required>
            </label>

            <label>
              Freight USD
              <input id="freight" name="freight" type="number" inputmode="decimal" step="0.01" min="0" placeholder="Optional">
            </label>

            <fieldset class="freight-mode">
              <legend>Freight Mode</legend>
              <label>
                <input type="radio" name="freightMode" value="perItem" checked>
                Per item
              </label>
              <label>
                <input type="radio" name="freightMode" value="total">
                Total
              </label>
            </fieldset>
          </div>

          <div class="result-strip" aria-label="Calculated item values">
            <div>
              <span>Landed Cost</span>
              <strong id="landedCost">$0.00</strong>
            </div>
            <div>
              <span>GTM$ EA</span>
              <strong id="gtmEachDollars">$0.00</strong>
            </div>
            <div>
              <span>GTM$ Total</span>
              <strong id="gtmTotalDollars">$0.00</strong>
            </div>
            <div>
              <span>GTM%</span>
              <strong id="gtmTotalPercent">0.00%</strong>
            </div>
          </div>

          <div class="button-row">
            <button id="itemSubmit" type="submit" class="button primary">Add Item</button>
            <button id="clearItem" type="button" class="button secondary">Clear</button>
            <button id="saveQuote" type="button" class="button secondary">Save</button>
          </div>
        </form>
      </section>

      <section class="panel quote-panel" aria-labelledby="quote-heading">
        <div class="section-heading">
          <h2 id="quote-heading">Active Quote</h2>
          <span id="savedState" class="save-state">Not saved</span>
        </div>

        <div class="quote-meta">
          <label>
            Customer
            <input id="customerName" type="text" autocomplete="organization">
          </label>
          <label>
            Date
            <input id="quoteDate" type="date">
          </label>
        </div>

        <div class="totals-grid">
          <div>
            <span>Order Total</span>
            <strong id="orderTotal">$0.00</strong>
          </div>
          <div>
            <span>Total Cost</span>
            <strong id="totalCost">$0.00</strong>
          </div>
          <div>
            <span>Total GTM$</span>
            <strong id="totalGtm">$0.00</strong>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Cost</th>
                <th>GTM$ EA</th>
                <th>GTM$ Total</th>
                <th>GTM%</th>
                <th><span class="visually-hidden">Actions</span></th>
              </tr>
            </thead>
            <tbody id="quoteItems">
              <tr>
                <td colspan="8" class="empty-state">No quote items yet.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="button-row quote-actions">
          <button id="copyQuote" type="button" class="button secondary">Copy</button>
          <button id="emailQuote" type="button" class="button primary">Email</button>
        </div>
      </section>
    </main>

    <dialog id="quoteDialog">
      <div class="dialog-heading">
        <h2>Quote PDF</h2>
        <button id="closeQuote" type="button" class="icon-button" aria-label="Close quote preview">x</button>
      </div>
      <iframe id="quotePdf" title="Rendered quote PDF"></iframe>
      <div class="button-row">
        <button id="copyQuoteDialog" type="button" class="button secondary">Copy</button>
        <button id="emailQuoteDialog" type="button" class="button primary">Email</button>
      </div>
    </dialog>

    <script src="js/main.js"></script>
  </body>
</html>
