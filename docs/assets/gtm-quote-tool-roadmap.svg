<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1900" viewBox="0 0 1200 1900" role="img" aria-labelledby="title description">
  <title id="title">GTM Quote Tool product roadmap</title>
  <desc id="description">Versions 1.0 and 1.5 are complete. Version 2.0 Local Quote Library is currently in progress with workspace navigation under review. Versions 2.5 through 4.0 are planned future phases.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#062b4c"/>
      <stop offset="1" stop-color="#031a31"/>
    </linearGradient>
    <linearGradient id="current" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf8f2"/>
      <stop offset="1" stop-color="#fff8e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#061c2f" flood-opacity="0.16"/>
    </filter>
    <style>
      .card { fill: #fff; stroke: #d5dde2; stroke-width: 2; }
      .version { font: 800 46px Arial, Helvetica, sans-serif; }
      .heading { fill: #082b4b; font: 800 32px Arial, Helvetica, sans-serif; letter-spacing: .5px; }
      .body { fill: #263746; font: 24px Arial, Helvetica, sans-serif; }
      .status { font: 800 20px Arial, Helvetica, sans-serif; letter-spacing: 1.2px; }
      .step { fill: #fff; font: 800 34px Arial, Helvetica, sans-serif; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="1200" height="1900" fill="#f4f2ed"/>
  <rect width="1200" height="255" fill="url(#header)"/>
  <text x="600" y="92" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="900" text-anchor="middle" letter-spacing="2">GTM QUOTE TOOL ROADMAP</text>
  <rect x="485" y="122" width="230" height="7" rx="4" fill="#f59a23"/>
  <text x="600" y="181" fill="#f7a43a" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" font-style="italic" text-anchor="middle">From mobile calculator to connected company system</text>
  <text x="600" y="224" fill="#c8d8e5" font-family="Arial, Helvetica, sans-serif" font-size="20" text-anchor="middle">Updated for the current Version 2.0 implementation phase</text>

  <line x1="105" y1="330" x2="105" y2="1620" stroke="#082b4b" stroke-width="10" stroke-linecap="round"/>

  <!-- Version 1.0 -->
  <circle cx="105" cy="365" r="49" fill="#167a55" stroke="#fff" stroke-width="9" filter="url(#shadow)"/>
  <text class="step" x="105" y="368">1</text>
  <g filter="url(#shadow)">
    <rect class="card" x="180" y="285" width="950" height="170" rx="24"/>
  </g>
  <text class="version" x="225" y="350" fill="#167a55">V1.0</text>
  <text class="heading" x="385" y="348">RELIABLE MOBILE QUOTING</text>
  <text class="body" x="225" y="395">Phone-first calculator • Branded customer PDF • Download, share &amp; email</text>
  <rect x="900" y="405" width="185" height="34" rx="17" fill="#167a55"/>
  <text class="status" x="992" y="429" fill="#fff" text-anchor="middle">COMPLETE</text>

  <!-- Version 1.5 -->
  <circle cx="105" cy="570" r="49" fill="#167a55" stroke="#fff" stroke-width="9" filter="url(#shadow)"/>
  <text class="step" x="105" y="573">2</text>
  <g filter="url(#shadow)">
    <rect class="card" x="180" y="490" width="950" height="170" rx="24"/>
  </g>
  <text class="version" x="225" y="555" fill="#167a55">V1.5</text>
  <text class="heading" x="385" y="553">CATALOG SEARCH</text>
  <text class="body" x="225" y="600">CSV import • Unified SKU, name, description &amp; dimension search • My Items</text>
  <rect x="900" y="610" width="185" height="34" rx="17" fill="#167a55"/>
  <text class="status" x="992" y="634" fill="#fff" text-anchor="middle">COMPLETE</text>

  <!-- Version 2.0 -->
  <circle cx="105" cy="775" r="56" fill="#f47a00" stroke="#fff" stroke-width="9" filter="url(#shadow)"/>
  <text class="step" x="105" y="778">3</text>
  <g filter="url(#shadow)">
    <rect x="180" y="685" width="950" height="190" rx="24" fill="url(#current)" stroke="#f47a00" stroke-width="5"/>
  </g>
  <text class="version" x="225" y="752" fill="#f06400">V2.0</text>
  <text class="heading" x="385" y="750">LOCAL QUOTE LIBRARY</text>
  <text class="body" x="225" y="800">IndexedDB library • Local numbers • Immutable versions • Controlled statuses</text>
  <text class="body" x="225" y="837">Navigation in review • Release hardening next</text>
  <rect x="735" y="693" width="350" height="37" rx="18" fill="#f47a00"/>
  <text class="status" x="910" y="719" fill="#fff" text-anchor="middle">CURRENT • IN PROGRESS</text>

  <!-- Version 2.5 -->
  <circle cx="105" cy="990" r="49" fill="#0b365c" stroke="#fff" stroke-width="9" filter="url(#shadow)"/>
  <text class="step" x="105" y="993">4</text>
  <g filter="url(#shadow)">
    <rect class="card" x="180" y="910" width="950" height="170" rx="24"/>
  </g>
  <text class="version" x="225" y="975" fill="#f06400">V2.5</text>
  <text class="heading" x="385" y="973">BACKUP &amp; RESTORE</text>
  <text class="body" x="225" y="1020">JSON backup/restore • Validation • Merge or replace • CSV &amp; quote exports</text>
  <rect x="930" y="1030" width="155" height="34" rx="17" fill="#6f7f8c"/>
  <text class="status" x="1007" y="1054" fill="#fff" text-anchor="middle">PLANNED</text>

  <!-- Version 3.0 -->
  <circle cx="105" cy="1195" r="49" fill="#0b365c" stroke="#fff" stroke-width="9" filter="url(#shadow)"/>
  <text class="step" x="105" y="1198">5</text>
  <g filter="url(#shadow)">
    <rect class="card" x="180" y="1115" width="950" height="170" rx="24"/>
  </g>
  <text class="version" x="225" y="1180" fill="#167a55">V3.0</text>
  <text class="heading" x="385" y="1178">PROGRESSIVE WEB APP</text>
  <text class="body" x="225" y="1225">Installable • Offline calculator, catalog &amp; drafts • Safe cache migration</text>
  <rect x="930" y="1235" width="155" height="34" rx="17" fill="#6f7f8c"/>
  <text class="status" x="1007" y="1259" fill="#fff" text-anchor="middle">PLANNED</text>

  <!-- Version 3.5 -->
  <circle cx="105" cy="1400" r="49" fill="#0b365c" stroke="#fff" stroke-width="9" filter="url(#shadow)"/>
  <text class="step" x="105" y="1403">6</text>
  <g filter="url(#shadow)">
    <rect class="card" x="180" y="1320" width="950" height="170" rx="24"/>
  </g>
  <text class="version" x="225" y="1385" fill="#0b365c">V3.5</text>
  <text class="heading" x="385" y="1383">MOBILE WORKFLOW</text>
  <text class="body" x="225" y="1430">Favorites • Pricing history • One-handed tools • Attachments • Dark mode</text>
  <rect x="950" y="1440" width="135" height="34" rx="17" fill="#6f7f8c"/>
  <text class="status" x="1017" y="1464" fill="#fff" text-anchor="middle">LATER</text>

  <!-- Version 4.0 -->
  <circle cx="105" cy="1605" r="49" fill="#0b365c" stroke="#fff" stroke-width="9" filter="url(#shadow)"/>
  <text class="step" x="105" y="1608">7</text>
  <g filter="url(#shadow)">
    <rect class="card" x="180" y="1525" width="950" height="170" rx="24"/>
  </g>
  <text class="version" x="225" y="1590" fill="#f06400">V4.0</text>
  <text class="heading" x="385" y="1588">HOSTED COMPANY SYSTEM</text>
  <text class="body" x="225" y="1635">Shared database • Authentication • Sync • Central numbering • Integrations</text>
  <rect x="950" y="1645" width="135" height="34" rx="17" fill="#6f7f8c"/>
  <text class="status" x="1017" y="1669" fill="#fff" text-anchor="middle">FUTURE</text>

  <rect x="70" y="1745" width="1060" height="105" rx="24" fill="url(#header)"/>
  <text x="600" y="1790" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" text-anchor="middle">CURRENT PHASE: V2.0 LOCAL QUOTE LIBRARY</text>
  <text x="600" y="1826" fill="#c8d8e5" font-family="Arial, Helvetica, sans-serif" font-size="21" text-anchor="middle">Workspace navigation is in review; release hardening follows.</text>
</svg>
